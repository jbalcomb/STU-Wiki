name: Scheduled Scrape

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        run: |
          python -m mom_wiki.cli scrape

      - name: Rebuild search index
        run: |
          python -m mom_wiki.cli rebuild-index

      - name: Generate stats
        run: |
          python -m mom_wiki.cli generate-stats --output docs/stats.svg

      - name: Commit changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          # corpus/ is gitignored — only the regenerated stats badge is committed.
          git add docs/stats.svg
          git diff --staged --quiet || git commit -m "chore: update stats badge [skip ci]"

      - name: Push changes
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
