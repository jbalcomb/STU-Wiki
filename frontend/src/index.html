<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master of Magic Wiki - 3D Graph Explorer</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header id="header">
            <h1>Master of Magic Wiki</h1>
            <nav>
                <a href="./" class="active">Graph View</a>
                <a href="./admin.html">Admin</a>
            </nav>
            <div id="search-container">
                <input type="text" id="search-input" placeholder="Search spells, units, items...">
                <button id="search-btn">Search</button>
            </div>
            <div id="filter-container">
                <select id="type-filter">
                    <option value="">All Types</option>
                    <option value="spell">Spells</option>
                    <option value="unit">Units</option>
                    <option value="item">Items</option>
                    <option value="wizard">Wizards</option>
                    <option value="ability">Abilities</option>
                </select>
                <select id="realm-filter">
                    <option value="">All Realms</option>
                    <option value="Life">Life</option>
                    <option value="Death">Death</option>
                    <option value="Nature">Nature</option>
                    <option value="Sorcery">Sorcery</option>
                    <option value="Chaos">Chaos</option>
                    <option value="Arcane">Arcane</option>
                </select>
            </div>
        </header>

        <!-- Main Content -->
        <main id="main">
            <!-- 3D Graph Container -->
            <div id="graph-container"></div>

            <!-- Detail Panel -->
            <aside id="detail-panel" class="hidden">
                <button id="close-panel">&times;</button>
                <div id="detail-content">
                    <h2 id="detail-title"></h2>
                    <div id="detail-meta"></div>
                    <div id="detail-body"></div>
                    <div id="detail-related"></div>
                </div>
            </aside>
        </main>

        <!-- Footer / Stats -->
        <footer id="footer">
            <div id="stats">
                <span id="node-count">0 nodes</span>
                <span id="edge-count">0 edges</span>
            </div>
            <div id="controls-hint">
                Drag to rotate | Scroll to zoom | Click node for details
            </div>
        </footer>
    </div>

    <!-- Load dependencies -->
    <script src="https://unpkg.com/three@0.150.1/build/three.min.js"></script>
    <script src="https://unpkg.com/3d-force-graph@1.72.3/dist/3d-force-graph.min.js"></script>
    <script src="https://unpkg.com/lunr@2.3.9/lunr.min.js"></script>

    <!-- App modules -->
    <script src="./api.js"></script>
    <script src="./search.js"></script>
    <script src="./graph.js"></script>
    <script src="./main.js"></script>
</body>
</html>
